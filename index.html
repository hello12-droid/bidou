<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#2D5016"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Bidou"/>
<title>Bidou Familiale</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{background:#F7F4EF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
input,textarea,button,select{font-family:inherit;outline:none;}
::-webkit-scrollbar{display:none;}
button{cursor:pointer;}
a{color:#2D5016;text-decoration:none;}
#sync-bar{position:fixed;top:0;left:0;right:0;z-index:999;background:#4A7C2F;color:#fff;font-size:12px;font-weight:700;text-align:center;padding:6px;display:none;}
</style>
</head>
<body>

<div id="sync-bar">🔄 Synchronisation en cours…</div>

<!-- HEADER -->
<div id="header" style="background:#2D5016;color:#fff;padding:18px 20px 14px;padding-top:max(18px,env(safe-area-inset-top));position:sticky;top:0;z-index:50;">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;">
    <div>
      <div style="font-size:10px;letter-spacing:.13em;text-transform:uppercase;opacity:.65;margin-bottom:2px;">Bidou Familiale</div>
      <div id="header-title" style="font-size:21px;font-weight:800;">🥫 Aliments</div>
    </div>
    <div id="sync-status" style="font-size:11px;font-weight:700;margin-top:4px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,0.15);">⏳ Connexion…</div>
  </div>
</div>

<!-- CONTENT -->
<div id="content" style="flex:1;padding:14px 14px 88px;min-height:calc(100vh - 120px);"></div>

<!-- NAV -->
<div id="navbar" style="position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E2DDD5;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,6px);">
  <button onclick="showTab('food')" id="nav-food" style="flex:1;background:none;border:none;padding:9px 0 5px;display:flex;flex-direction:column;align-items:center;gap:2px;">
    <svg width="21" height="21" viewBox="0 0 24 24"><path id="ico-food" fill="#6B6B6B" d="M18 3v2h-2V3H8v2H6V3H4v18h16V3h-2zm0 16H6V7h12v12z"/></svg>
    <span id="lbl-food" style="font-size:9px;color:#6B6B6B;font-weight:500;">Aliments</span>
  </button>
  <button onclick="showTab('recipes')" id="nav-recipes" style="flex:1;background:none;border:none;padding:9px 0 5px;display:flex;flex-direction:column;align-items:center;gap:2px;">
    <svg width="21" height="21" viewBox="0 0 24 24"><path id="ico-recipes" fill="#6B6B6B" d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>
    <span id="lbl-recipes" style="font-size:9px;color:#6B6B6B;font-weight:500;">Recettes</span>
  </button>
  <button onclick="showTab('alerts')" style="flex:1;background:none;border:none;padding:9px 0 5px;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;">
    <svg width="21" height="21" viewBox="0 0 24 24"><path id="ico-alerts" fill="#6B6B6B" d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    <span id="alert-badge" style="display:none;position:absolute;top:5px;right:18px;background:#C0392B;color:#fff;border-radius:50%;width:15px;height:15px;font-size:9px;font-weight:700;align-items:center;justify-content:center;"></span>
    <span id="lbl-alerts" style="font-size:9px;color:#6B6B6B;font-weight:500;">Alertes</span>
  </button>
  <button onclick="showTab('share')" style="flex:1;background:none;border:none;padding:9px 0 5px;display:flex;flex-direction:column;align-items:center;gap:2px;">
    <svg width="21" height="21" viewBox="0 0 24 24"><path id="ico-share" fill="#6B6B6B" d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    <span id="lbl-share" style="font-size:9px;color:#6B6B6B;font-weight:500;">Partage</span>
  </button>
  <button onclick="showTab('restos')" style="flex:1;background:none;border:none;padding:9px 0 5px;display:flex;flex-direction:column;align-items:center;gap:2px;">
    <svg width="21" height="21" viewBox="0 0 24 24"><path id="ico-restos" fill="#6B6B6B" d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-2.27-1.35-3.97-2.84-5.14C11.6 8.79 9.07 8 6.5 8 3.96 8 1.5 8.82 0 10.84v4.15h16.03v-1z"/></svg>
    <span id="lbl-restos" style="font-size:9px;color:#6B6B6B;font-weight:500;">Restos</span>
  </button>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModal()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center;">
  <div onclick="event.stopPropagation()" style="background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:24px 20px 48px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <h3 id="modal-title" style="margin:0;font-size:17px;color:#1A1A1A;"></h3>
      <button onclick="closeModal()" style="background:none;border:none;font-size:22px;color:#6B6B6B;padding:0;">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDsli6siycwWLz9BjeiNDyhKBw5ChOxFpg",
  authDomain: "bidou-familial.firebaseapp.com",
  databaseURL: "https://bidou-familial-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bidou-familial",
  storageBucket: "bidou-familial.firebasestorage.app",
  messagingSenderId: "311387725890",
  appId: "1:311387725890:web:8189a6c233e8c95f144ddb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const INIT_FOODS=[
  {id:1,name:"Farine",qty:200,unit:"g",min:500,store:"Carrefour",category:"Épicerie"},
  {id:2,name:"Oeufs",qty:6,unit:"unités",min:4,store:"Marché local",category:"Frais"},
  {id:3,name:"Lait",qty:0.5,unit:"L",min:1,store:"Lidl",category:"Frais"},
  {id:4,name:"Beurre",qty:250,unit:"g",min:100,store:"Carrefour",category:"Frais"},
  {id:5,name:"Sucre",qty:800,unit:"g",min:300,store:"Leclerc",category:"Épicerie"},
  {id:6,name:"Tomates",qty:3,unit:"unités",min:4,store:"Marché local",category:"Légumes"},
  {id:7,name:"Pâtes",qty:500,unit:"g",min:200,store:"Leclerc",category:"Épicerie"},
  {id:8,name:"Huile olive",qty:300,unit:"mL",min:200,store:"Carrefour",category:"Épicerie"},
  {id:9,name:"Ail",qty:2,unit:"gousses",min:3,store:"Marché local",category:"Légumes"},
];
const INIT_RECIPES=[
  {id:1,name:"Crêpes maison",emoji:"🥞",duration:"30 min",servings:4,
   ingredients:[{foodId:1,name:"Farine",qty:250,unit:"g"},{foodId:2,name:"Oeufs",qty:3,unit:"unités"},{foodId:3,name:"Lait",qty:0.5,unit:"L"},{foodId:4,name:"Beurre",qty:50,unit:"g"}],
   steps:["Mélanger la farine et les œufs.","Ajouter le lait progressivement.","Incorporer le beurre fondu, reposer 30 min.","Cuire chaque crêpe 1-2 min de chaque côté."]},
  {id:2,name:"Pâtes tomate",emoji:"🍝",duration:"20 min",servings:2,
   ingredients:[{foodId:7,name:"Pâtes",qty:200,unit:"g"},{foodId:6,name:"Tomates",qty:3,unit:"unités"},{foodId:8,name:"Huile olive",qty:30,unit:"mL"},{foodId:9,name:"Ail",qty:2,unit:"gousses"}],
   steps:["Cuire les pâtes al dente.","Faire revenir l'ail dans l'huile.","Ajouter les tomates, mijoter 10 min.","Mélanger avec les pâtes et servir."]},
];
const INIT_MEMBERS=[
  {id:1,name:"Marie",avatar:"👩",device:"iPhone 15"},
  {id:2,name:"Thomas",avatar:"👨",device:"Samsung S24"},
];
const INIT_RESTOS=[
  {id:1,name:"Le Petit Bistro",location:"Paris 6e",rating:8,comment:"Excellent magret, cadre chaleureux.",website:"https://lepetitbistro.fr"},
];

// Expose Firebase write to global scope
window._fbWrite = function(path, data) {
  const r = ref(db, path);
  return set(r, data);
};

// Listen to all data in real time
function listen(path, cb) {
  onValue(ref(db, path), snap => {
    const val = snap.val();
    cb(val);
  });
}

// Initialize data if empty, then listen
listen('foods', val => {
  if (val === null) {
    window._fbWrite('foods', INIT_FOODS);
    window.foods = INIT_FOODS;
  } else {
    window.foods = Array.isArray(val) ? val : Object.values(val);
  }
  if (window.currentTab === 'food' || window.currentTab === 'alerts') renderTab(window.currentTab);
  updateBadge();
});

listen('recipes', val => {
  if (val === null) {
    window._fbWrite('recipes', INIT_RECIPES);
    window.recipes = INIT_RECIPES;
  } else {
    window.recipes = Array.isArray(val) ? val : Object.values(val);
  }
  if (window.currentTab === 'recipes') renderTab('recipes');
});

listen('members', val => {
  if (val === null) {
    window._fbWrite('members', INIT_MEMBERS);
    window.members = INIT_MEMBERS;
  } else {
    window.members = Array.isArray(val) ? val : Object.values(val);
  }
  if (window.currentTab === 'share') renderTab('share');
});

listen('restos', val => {
  if (val === null) {
    window._fbWrite('restos', INIT_RESTOS);
    window.restos = INIT_RESTOS;
  } else {
    window.restos = Array.isArray(val) ? val : Object.values(val);
  }
  if (window.currentTab === 'restos') renderTab('restos');
});

// Connection status
onValue(ref(db, '.info/connected'), snap => {
  const connected = snap.val();
  const el = document.getElementById('sync-status');
  if (el) {
    el.textContent = connected ? '🟢 Synchronisé' : '🔴 Hors ligne';
    el.style.background = connected ? 'rgba(255,255,255,0.2)' : 'rgba(192,57,43,0.4)';
  }
});

// Start app after a short delay to ensure listeners are set
setTimeout(() => { window.appReady = true; showTab('food'); }, 500);
</script>

<script>
// ── GLOBALS ──────────────────────────────────────────────────────────────────
window.foods = [];
window.recipes = [];
window.members = [];
window.restos = [];
window.currentTab = 'food';
window.currentRecipeId = null;
window.editIngredients = [];
window.editSteps = [];
window.editRating = 5;
window.appReady = false;

function fbSave(path, data) {
  if (window._fbWrite) {
    const bar = document.getElementById('sync-bar');
    bar.style.display = 'block';
    window._fbWrite(path, data).then(() => {
      setTimeout(() => bar.style.display = 'none', 800);
    }).catch(() => bar.style.display = 'none');
  }
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function isLow(f){return f.qty < f.min;}
function freshRatio(f){if(!f.min)return 1;return Math.min(f.qty/(f.min*2),1);}
function missingIngs(r){return (r.ingredients||[]).filter(i=>{const f=(window.foods||[]).find(x=>x.id===i.foodId);return !f||f.qty<i.qty;}).map(i=>i.name);}
function uid(){return Date.now();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fbar(ratio){const c=ratio<0.3?'#C0392B':ratio<0.6?'#E8A020':'#4A7C2F';return `<div style="height:4px;background:#E2DDD5;border-radius:2px;overflow:hidden;margin-top:6px;"><div style="height:100%;width:${ratio*100}%;background:${c};border-radius:2px;"></div></div>`;}
function field(label,attrs,ta){const base='width:100%;padding:10px 12px;border:1px solid #E2DDD5;border-radius:10px;font-size:15px;color:#1A1A1A;background:#F7F4EF;box-sizing:border-box;outline:none;';return `<div style="margin-bottom:14px;"><label style="display:block;font-size:11px;font-weight:700;color:#6B6B6B;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">${label}</label>${ta?`<textarea ${attrs} style="${base}resize:vertical;min-height:70px;"></textarea>`:`<input ${attrs} style="${base}">`}</div>`;}
function btn(label,onclick,v='pri',sm=false){const S={pri:'background:#2D5016;color:#fff;border:none;',sec:'background:#EAF0E3;color:#2D5016;border:none;',dan:'background:#FDEDEC;color:#C0392B;border:none;',ghost:'background:transparent;color:#6B6B6B;border:1px solid #E2DDD5;',amb:'background:#FDF3E3;color:#E8A020;border:1px solid #E8A020;',pur:'background:#F0EAF8;color:#6B3FA0;border:none;'}[v];return `<button onclick="${onclick}" style="${S}border-radius:10px;padding:${sm?'7px 13px':'11px 18px'};font-size:${sm?13:15}px;font-weight:600;cursor:pointer;">${label}</button>`;}

// ── MODAL ────────────────────────────────────────────────────────────────────
function openModal(title,html){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-overlay').style.display='flex';}
function closeModal(){document.getElementById('modal-overlay').style.display='none';}

// ── NAV ──────────────────────────────────────────────────────────────────────
const tabTitles={food:'🥫 Aliments',recipes:'📖 Recettes',alerts:'🔔 Alertes',share:'👥 Partage',restos:'🍽️ Restaurants'};
const tabIds=['food','recipes','alerts','share','restos'];

function showTab(tab){
  window.currentTab=tab;
  window.currentRecipeId=null;
  document.getElementById('header-title').textContent=tabTitles[tab];
  tabIds.forEach(t=>{
    const ico=document.getElementById('ico-'+t);const lbl=document.getElementById('lbl-'+t);
    if(ico)ico.setAttribute('fill',t===tab?'#2D5016':'#6B6B6B');
    if(lbl){lbl.style.color=t===tab?'#2D5016':'#6B6B6B';lbl.style.fontWeight=t===tab?'700':'500';}
  });
  updateBadge();renderTab(tab);
}
function updateBadge(){
  const low=(window.foods||[]).filter(isLow).length;
  const b=document.getElementById('alert-badge');
  b.textContent=low;b.style.display=low>0?'flex':'none';
}
function renderTab(tab){
  const c=document.getElementById('content');
  if(!c)return;
  if(tab==='food')c.innerHTML=renderFood();
  else if(tab==='recipes')c.innerHTML=renderRecipes();
  else if(tab==='alerts')c.innerHTML=renderAlerts();
  else if(tab==='share')c.innerHTML=renderShare();
  else if(tab==='restos')c.innerHTML=renderRestos();
}

// ── FOOD ─────────────────────────────────────────────────────────────────────
function renderFood(q=''){
  const filtered=(window.foods||[]).filter(f=>f.name&&f.name.toLowerCase().includes(q.toLowerCase()));
  let h=`<div style="display:flex;gap:10px;margin-bottom:14px;">
    <input id="food-search" value="${esc(q)}" oninput="renderFoodQ()" placeholder="🔍 Rechercher…" style="flex:1;padding:10px 14px;border-radius:12px;border:1px solid #E2DDD5;font-size:14px;background:#fff;">
    ${btn('+ Ajouter','openAddFood()','pri',true)}
  </div>`;
  if(filtered.length===0)h+=`<div style="text-align:center;padding:30px;color:#6B6B6B;">Aucun aliment trouvé</div>`;
  filtered.forEach(f=>{
    const low=isLow(f);const ratio=freshRatio(f);
    h+=`<div style="background:#fff;border-radius:14px;padding:13px 15px;margin-bottom:9px;border:1px solid ${low?'#C0392B':'#E2DDD5'};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;">
            <span style="font-weight:700;font-size:15px;">${esc(f.name)}</span>
            ${low?'<span style="background:#FDEDEC;color:#C0392B;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;">Stock bas</span>':''}
          </div>
          <div style="color:#6B6B6B;font-size:13px;margin-top:2px;">${f.qty} ${esc(f.unit)} · min. ${f.min} ${esc(f.unit)}</div>
          <div style="color:#6B6B6B;font-size:12px;margin-top:3px;">📍 ${esc(f.store||'—')} · ${esc(f.category||'—')}</div>
          ${fbar(ratio)}
        </div>
        <div style="display:flex;gap:5px;margin-left:8px;">
          <button onclick="openEditFood(${f.id})" style="background:#EAF0E3;border:none;border-radius:8px;padding:7px;">✏️</button>
          <button onclick="deleteFood(${f.id})" style="background:#FDEDEC;border:none;border-radius:8px;padding:7px;">🗑️</button>
        </div>
      </div>
    </div>`;
  });
  return h;
}
function renderFoodQ(){const q=document.getElementById('food-search').value;document.getElementById('content').innerHTML=renderFood(q);}
function openAddFood(){openModal('Ajouter un aliment',foodForm());}
function openEditFood(id){const f=(window.foods||[]).find(x=>x.id===id);if(!f)return;openModal('Modifier l\'aliment',foodForm(f));}
function foodForm(f={}){return `
  ${field('Nom',`id="ff-name" value="${esc(f.name||'')}" placeholder="Ex: Farine"`)}
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
    ${field('Quantité',`id="ff-qty" type="number" value="${f.qty||''}"`)}
    ${field('Unité',`id="ff-unit" value="${esc(f.unit||'')}" placeholder="g, L…"`)}
  </div>
  ${field('Seuil minimum',`id="ff-min" type="number" value="${f.min||''}"`)}
  ${field('Magasin',`id="ff-store" value="${esc(f.store||'')}" placeholder="Ex: Carrefour"`)}
  ${field('Catégorie',`id="ff-cat" value="${esc(f.category||'')}" placeholder="Épicerie, Frais…"`)}
  <div style="display:flex;gap:10px;margin-top:6px;">${btn('✓ Enregistrer',`saveFood(${f.id||0})`)}&nbsp;${btn('Annuler','closeModal()','ghost')}</div>`;}
function saveFood(id){
  const name=document.getElementById('ff-name').value.trim();if(!name)return alert('Nom requis');
  const item={id:id||uid(),name,qty:+document.getElementById('ff-qty').value,unit:document.getElementById('ff-unit').value.trim(),min:+document.getElementById('ff-min').value,store:document.getElementById('ff-store').value.trim(),category:document.getElementById('ff-cat').value.trim()};
  let updated=[...(window.foods||[])];
  if(id)updated=updated.map(f=>f.id===id?item:f);else updated.push(item);
  window.foods=updated;fbSave('foods',updated);closeModal();showTab('food');
}
function deleteFood(id){
  if(!confirm('Supprimer cet aliment ?'))return;
  const updated=(window.foods||[]).filter(f=>f.id!==id);
  window.foods=updated;fbSave('foods',updated);showTab('food');
}

// ── RECIPES ───────────────────────────────────────────────────────────────────
function renderRecipes(q=''){
  if(window.currentRecipeId){const r=(window.recipes||[]).find(x=>x.id===window.currentRecipeId);if(r)return renderRecipeDetail(r);}
  const filtered=(window.recipes||[]).filter(r=>r.name&&r.name.toLowerCase().includes(q.toLowerCase()));
  let h=`<div style="display:flex;gap:9px;margin-bottom:11px;">
    <input id="rec-search" value="${esc(q)}" oninput="renderRecipesQ()" placeholder="🔍 Rechercher une recette…" style="flex:1;padding:10px 13px;border-radius:12px;border:1px solid #E2DDD5;font-size:14px;background:#fff;">
    ${btn('+ Ajouter','openAddRecipe()','pri',true)}
  </div>
  <div style="background:#F0EAF8;border-radius:13px;padding:13px 15px;margin-bottom:14px;">
    <div style="font-weight:700;color:#6B3FA0;font-size:13px;margin-bottom:7px;">🔍 Rechercher une recette en ligne (IA)</div>
    <div style="display:flex;gap:7px;">
      <input id="ai-search" placeholder="Ex: Quiche lorraine…" style="flex:1;padding:8px 11px;border-radius:9px;border:1px solid #E2DDD5;font-size:14px;" onkeydown="if(event.key==='Enter')doAiSearch()">
      ${btn('Chercher','doAiSearch()','pur',true)}
    </div>
    <div id="ai-result"></div>
  </div>`;
  filtered.forEach(r=>{
    const miss=missingIngs(r);const avail=miss.length===0;
    h+=`<div style="background:#fff;border-radius:15px;padding:15px;margin-bottom:11px;border:1px solid #E2DDD5;">
      <div style="display:flex;gap:13px;align-items:center;cursor:pointer;" onclick="openRecipeDetail(${r.id})">
        <div style="font-size:34px;">${r.emoji||'🍽️'}</div>
        <div style="flex:1;">

function openAddResto(){openModal('Ajouter un restaurant',restoForm());}
function openEditResto(id){const r=(window.restos||[]).find(x=>x.id===id);if(!r)return;openModal('Modifier le restaurant',restoForm(r));setTimeout(()=>{if(document.getElementById('rr-comment'))document.getElementById('rr-comment').value=r.comment||'';},50);}
function saveResto(id){const name=document.getElementById('rr-name').value.trim();if(!name)return alert('Nom requis');const item={id:id||uid(),name,location:document.getElementById('rr-loc').value.trim(),rating:window.editRating||5,comment:document.getElementById('rr-comment').value.trim(),website:document.getElementById('rr-web').value.trim()};let updated=[...(window.restos||[])];if(id)updated=updated.map(r=>r.id===id?item:r);else updated.push(item);window.restos=updated;fbSave('restos',updated);closeModal();showTab('restos');}
function deleteResto(id){if(!confirm('Supprimer ce restaurant ?'))return;const updated=(window.restos||[]).filter(r=>r.id!==id);window.restos=updated;fbSave('restos',updated);showTab('restos');}
</script>
</body>
</html>
